name: Code-to-Config Drift Check

# Runs on every Pull Request targeting main, and on direct pushes to main
on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  drift-check:
    name: Detect Code-to-Config Drift
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python setup ────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Install drift-checker dependency ────────────────────────────
      - name: Install PyYAML
        run: pip install pyyaml

      # ── 4. Run drift checker & capture output ──────────────────────────
      - name: Run drift checker
        id: drift
        run: |
          python drift_checker.py | tee drift_report.md
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
        continue-on-error: true   # let the next steps run even if drift found

      # ── 5. Post drift report as PR comment ─────────────────────────────
      - name: Post drift report on Pull Request
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('drift_report.md', 'utf8');

            // Find and delete any previous drift-check comment
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            for (const c of comments.data) {
              if (c.body.includes('Drift Checker Report')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: c.id,
                });
              }
            }

            // Post the new report
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 🔍 Drift Checker Report\n\n${report}\n\n---\n_Powered by [drift_checker.py](../blob/${context.sha}/drift_checker.py)_`,
            });

      # ── 6. Fail the pipeline if drift was detected ─────────────────────
      - name: Fail if drift detected
        if: steps.drift.outputs.exit_code != '0'
        run: |
          echo "::error::Config drift detected! See the PR comment for details."
          exit 1
