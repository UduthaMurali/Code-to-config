version: "3.8"

services:
  even-odd-app:
    build: .
    container_name: even-odd-app
    ports:
      - "5000:5000"
    environment:
      APP_NAME: "Even-Odd Checker"
      APP_VERSION: "1.0.0"
      APP_PORT: "5000"
      SECRET_KEY: "change-me-in-production"
      DEBUG_MODE: "false"
      MAX_INPUT: "1000000"
      BG_COLOR: "#f0f4f8"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
